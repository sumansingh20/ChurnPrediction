<!DOCTYPE html>
<html>
<head>
    <title>Churn Predictor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js">
        <script>

let chart;

// FORM SUBMIT
document.getElementById("predictForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let formData = new FormData(this);

    const resultBox = document.getElementById("resultBox"); // ✅ FIX
    resultBox.innerHTML = "Predicting...";

    fetch("/predict", {
        method: "POST",
        body: formData
    })
    .then(res => res.text())
    .then(data => {

        console.log("Prediction response:", data); // DEBUG

        if (data.includes("Churn")) {
            resultBox.innerHTML = "⚠️ Likely to Churn";
            resultBox.className = "result-box churn";
        } else {
            resultBox.innerHTML = "✅ Likely to Stay";
            resultBox.className = "result-box stay";
        }

        loadChart(); // refresh chart
    })
    .catch(err => console.log(err));
});


// CHART FUNCTION
function loadChart() {

    fetch('/stats')
    .then(res => res.json())
    .then(data => {

        console.log("Stats data:", data); // DEBUG

        const canvas = document.getElementById('churnChart');

        if (!canvas) {
            console.log("Canvas not found!");
            return;
        }

        const ctx = canvas.getContext('2d');

        if (chart) chart.destroy();

        chart = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: ['Churn', 'Stay'],
                datasets: [{
                    data: [data.churn || 0, data.stay || 0]
                }]
            }
        });

    })
    .catch(err => console.log("Chart error:", err));
}


// LOAD ON PAGE START
window.onload = loadChart;

</script>
    </script>

    <style>
        body {
            background: linear-gradient(to right, #141e30, #243b55);
            color: white;
        }

        .card {
            border-radius: 20px;
        }

        .result-box {
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            font-weight: bold;
            transition: 0.3s;
        }

        .churn {
            background-color: #ff4d4d;
        }

        .stay {
            background-color: #28a745;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <div class="text-center mb-4">
        <h1>Customer Churn Prediction</h1>
        <p>AI-powered system</p>
    </div>

    <div class="row">

        <!-- FORM -->
        <div class="col-md-6">
            <div class="card p-4 bg-dark shadow">

                <form id="predictForm">

                    <div class="mb-3">
                        <label>Tenure</label>
                        <input type="number" name="tenure" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label>Monthly Charges</label>
                        <input type="number" step="0.01" name="MonthlyCharges" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label>Total Charges</label>
                        <input type="number" step="0.01" name="TotalCharges" class="form-control" required>
                    </div>

                    <button class="btn btn-primary w-100">Predict</button>

                </form>

            </div>
        </div>

        <!-- RESULT + CHART -->
        <div class="col-md-6">
            <div class="card p-4 bg-dark shadow text-center">

                <h3>Prediction Result</h3>

                <div id="resultBox" class="result-box">
                    Waiting for input...
                </div>

                <canvas id="churnChart" class="mt-4"></canvas>

            </div>
        </div>

    </div>
</div>

<script>

let chart;

// Prediction (AJAX)
document.getElementById("predictForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let formData = new FormData(this);

    document.getElementById("resultBox").innerHTML = "Predicting...";

    fetch("/predict", {
        method: "POST",
        body: formData
    })
    .then(res => res.text())
    .then(data => {

        if (data.includes("Churn")) {
            resultBox.innerHTML = "⚠️ Likely to Churn";
            resultBox.className = "result-box churn";
        } else {
            resultBox.innerHTML = "✅ Likely to Stay";
            resultBox.className = "result-box stay";
        }

        loadChart();
    });
});

// Load chart
function loadChart() {

    fetch('/stats')
    .then(res => res.json())
    .then(data => {

        const ctx = document.getElementById('churnChart').getContext('2d');

        if (chart) chart.destroy();

        chart = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: ['Churn', 'Stay'],
                datasets: [{
                    data: [data.churn || 0, data.stay || 0]
                }]
            }
        });

    })
    .catch(err => console.log(err));
}

// Load on page start
loadChart();

</script>

</body>
</html>
