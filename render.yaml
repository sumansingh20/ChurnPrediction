services:
  - type: web
    name: churn-prediction
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.12
      - key: DATABASE_URL
        fromDatabase:
          name: churn-prediction-db
          property: connectionString

databases:
  - name: churn-prediction-db
    plan: free